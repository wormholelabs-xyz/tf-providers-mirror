# Validates providers.json against GHCR: every declared (type, tag, digest)
# must resolve to the declared digest at `ghcr.io/<owner>/terraform-provider-<type>:<tag>`.
#
# Runs on PRs that touch providers.json so reviewers see immediately whether
# a new entry is well-formed. Also runs on main pushes as a sanity check
# (catches upstream tags being repushed under us).

name: validate

on:
  pull_request:
    branches: [main]
    paths:
      - providers.json
      - .github/workflows/validate.yml
  push:
    branches: [main]
    paths:
      - providers.json
      - .github/workflows/validate.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2
        with:
          version: "1.3.1"
          url: "https://github.com/oras-project/oras/releases/download/v1.3.1/oras_1.3.1_linux_amd64.tar.gz"
          checksum: "d52c4af76ce6a3ceb8579e51fb751a43ac051cca67f965f973a0b0e897a2bb86"

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${GHCR_USER}" --password-stdin

      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require('fs');
            const { execFileSync } = require('child_process');

            const providers = JSON.parse(fs.readFileSync('providers.json', 'utf8'));
            const owner = context.repo.owner.toLowerCase();

            let checked = 0;
            let failures = 0;

            for (const [type, versions] of Object.entries(providers)) {
              for (const [tag, declaredDigest] of Object.entries(versions)) {
                const ref = `ghcr.io/${owner}/terraform-provider-${type}:${tag}`;
                checked++;

                let resolved;
                try {
                  resolved = execFileSync('oras', ['resolve', ref], { encoding: 'utf8' }).trim();
                } catch (e) {
                  core.error(`${ref}: failed to resolve — ${(e.stderr || e.message).toString().trim()}`);
                  failures++;
                  continue;
                }

                if (resolved !== declaredDigest) {
                  core.error(`${ref}: declared ${declaredDigest}, resolved ${resolved}`);
                  failures++;
                  continue;
                }

                core.info(`${ref}: OK (${resolved})`);
              }
            }

            core.info(`validated ${checked} entries`);
            if (failures > 0) {
              core.setFailed(`${failures} of ${checked} entries failed validation`);
            }
